<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator OS · 一人 MCN</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 线性图标库（stroke 风格，参考 Lucide/Feather） -->
  <svg style="display:none">
    <symbol id="i-edit" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></symbol>
    <symbol id="i-film" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.5"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 7h5M17 17h5"/></symbol>
    <symbol id="i-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></symbol>
    <symbol id="i-layers" viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></symbol>
    <symbol id="i-send" viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></symbol>
    <symbol id="i-chart" viewBox="0 0 24 24"><path d="M12 20V10M18 20V4M6 20v-4"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-box" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5M12 22V12"/></symbol>
    <symbol id="i-mic" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1M12 18v4"/></symbol>
  </svg>

  <div class="side">
    <div class="logo">
      <div class="mark"><span class="gem"></span>Creator OS</div>
      <div class="tagline">一人 MCN · Your One-Person Media Company</div>
    </div>

    <div class="navsec">流水线</div>
    <div id="projectNav"></div>
    <div class="nav" onclick="ui.newProject()"><svg class="ic"><use href="#i-plus"/></svg>新建视频</div>

    <div class="navsec">工具箱</div>
    <div class="nav" data-view="tool-script" onclick="ui.show('tool-script')"><svg class="ic"><use href="#i-edit"/></svg>脚本优化</div>
    <div class="nav" data-view="tool-broll" onclick="ui.show('tool-broll')"><svg class="ic"><use href="#i-film"/></svg>B-roll 策划</div>
    <div class="nav" data-view="tool-cover" onclick="ui.show('tool-cover')"><svg class="ic"><use href="#i-image"/></svg>封面工厂</div>
    <div class="nav" data-view="tool-copypack" onclick="ui.show('tool-copypack')"><svg class="ic"><use href="#i-layers"/></svg>文案包</div>
    <div class="nav" data-view="tool-publish" onclick="ui.show('tool-publish')"><svg class="ic"><use href="#i-send"/></svg>发布台</div>
    <div class="nav" data-view="tool-insights" onclick="ui.show('tool-insights')"><svg class="ic"><use href="#i-chart"/></svg>数据复盘 <span class="badge dim">roadmap</span></div>
  </div>

  <div class="main" id="main"></div>

<script src="app.js"></script>
</body>
</html>
